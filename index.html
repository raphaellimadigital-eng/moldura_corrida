<!DOCTYPE html>
<html>
<head>
  <title>Moldura Corrida</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ffb6c1 0%, #ff69b4 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h2 {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #e75480aa;
    }
    .subtitulo {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      margin: 0 1rem 1.4rem;
      text-shadow: 0 2px 8px #e7548088;
    }
    #upload_widget {
      background: #fff;
      color: #e75480;
      border: none;
      border-radius: 30px;
      padding: 0.9rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px #e7548033;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 2rem;
    }
    #upload_widget:hover {
      background: #e75480;
      color: #fff;
    }
    #resultado {
      background: #fff8fa;
      border-radius: 18px;
      box-shadow: 0 2px 12px #e7548033;
      padding: 2rem 2.5rem;
      margin-top: 1.5rem;
      text-align: center;
      min-width: 320px;
      max-width: 90vw;
      display: none;
    }
    #resultado img {
      border-radius: 12px;
      margin-top: 1rem;
      box-shadow: 0 2px 12px #e7548033;
    }
    #resultado a {
      display: inline-block;
      margin-top: 1.2rem;
      background: #e75480;
      color: #fff;
      padding: 0.7rem 1.6rem;
      border-radius: 22px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: background 0.2s;
    }
    #resultado a:hover {
      background: #ff69b4;
    }
    .moldura-preview {
      background: #fff8fa;
      border-radius: 18px;
      box-shadow: 0 2px 12px #e7548033;
      padding: 1.3rem 1.2rem 1rem;
      margin-top: 0.4rem;
      text-align: center;
    }
    .moldura-preview p {
      color: #e75480;
      margin: 0 0 0.7rem;
      font-weight: 700;
    }
    .moldura-preview img {
      width: 190px;
      border-radius: 10px;
      box-shadow: 0 2px 12px #e7548033;
    }
    .compartilhe-info {
      margin-top: 1rem;
      color: #e75480;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
    }
    @media (max-width: 600px) {
      #resultado {
        padding: 1rem 0.5rem;
        min-width: unset;
      }
      h2 {
        font-size: 1.3rem;
      }
      .subtitulo {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

<h2>Faça o upload da sua foto</h2>
<p class="subtitulo">Para baixar sua arte com a moldura oficial.</p>
<button id="upload_widget">Enviar Foto</button>

<div class="moldura-preview">
  <p>Prévia da moldura</p>
  <img src="https://res.cloudinary.com/dbpefj4xo/image/upload/w_1080,h_1920,c_fill/correbel_atletaconfirmada.png_b4adfx" alt="Moldura oficial da corrida">
</div>

<div id="resultado"></div>

<script>
  var myWidget = cloudinary.createUploadWidget({
    cloudName: 'dbpefj4xo',
    uploadPreset: 'upload_corrida',
    cropping: true,
    croppingAspectRatio: 9 / 16,
    croppingCoordinatesMode: 'custom',
    showSkipCropButton: false
  }, (error, result) => {
    console.log('Cloudinary callback:', { error, result });
    if (error) {
      console.error('Erro Cloudinary:', error);
      document.getElementById("resultado").style.display = "block";
      document.getElementById("resultado").innerHTML = `<p style='color:red;'>Erro: ${error.message || error}</p>`;
      return;
    }
    if (result) {
      console.log('Evento Cloudinary:', result.event, result);
    }
    if (result && result.event === "success") {
      let publicId = result.info.public_id;
      let temRecorteManual = Array.isArray(result.info.custom_coordinates) || !!result.info.custom_coordinates;
      let gravidade = temRecorteManual ? 'g_custom' : 'g_auto';
      let urlFinal = `https://res.cloudinary.com/dbpefj4xo/image/upload/c_fill,${gravidade},w_1080,h_1920/f_auto,q_auto/l_correbel_atletaconfirmada.png_b4adfx,w_1080,h_1920,c_fill/fl_layer_apply/${publicId}`;
      document.getElementById("resultado").style.display = "block";
      document.getElementById("resultado").innerHTML = `
        <p>Sua foto pronta 👇</p>
        <img src="${urlFinal}" width="300"/>
        <br><br>
        <a href="${urlFinal}" download>Baixar Sua Foto</a>
        <p class="compartilhe-info">Após baixar, compartilhe em suas redes sociais marcando<br>@circuito.correbel e @correriadabaixada</p>
      `;
    }
  });

  document.getElementById("upload_widget").addEventListener("click", function(){
    myWidget.open();
  }, false);
</script>

</body>
</html>
